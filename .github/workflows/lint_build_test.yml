---
name: Lint, build and test SRP
on:
  pull_request:
    branches:
      - master
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cpplint:
    name: CppLint Check
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/simba-avionic/simba_avionics_dockers/docker-action:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run cpplint
        run: |
          /bin/bash ./tools/cpplint/cpplint.sh

  build-and-test:
    name: SRP Build & Test SRP
    needs: cpplint
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/simba-avionic/simba_avionics_dockers/docker-action:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        run: |
          bazel build --config=bbb-platform //deployment/cpu/ec:pkg //deployment/cpu/fc:pkg

      - name: Test
        run: |
          ./tools/ut/unittest.sh

      - name: Build all
        run: |
          ./tools/build_all/build_all.sh
